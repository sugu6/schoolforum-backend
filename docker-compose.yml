services:
  manticore:
    image: manticoresearch/manticore:latest
    container_name: manticore
    restart: always
    ports:
      - "9306:9306"
      - "9308:9308"
      - "9312:9312"
    volumes:
      - manticore_data:/var/lib/manticore
    environment:
      - TZ=Asia/Shanghai
      - EXTRA=1
    healthcheck:
      test: ["CMD", "mysqladmin", "-h", "127.0.0.1", "-P", "9306", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  schoolforum:
    image: ghcr.io/suguny/schoolforum-backend:latest
    container_name: schoolforum
    restart: always
    env_file:
      - .env
    command: ["sh", "-c", "java ${JAVA_OPTS:--Xms256m -Xmx512m} -jar app.jar"]
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_ADDRESS=0.0.0.0
      - SERVER_PORT=8085
      - MANTICORE_HOST=${MANTICORE_HOST:-http://manticore}
      - MANTICORE_PORT=${MANTICORE_PORT:-9308}
    ports:
      - "8085:8085"
    volumes:
      - /var/log/schoolforum:/var/log/schoolforum
      - uploads_data:/app/uploads
    depends_on:
      manticore:
        condition: service_started
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8085"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

volumes:
  manticore_data:
  uploads_data:
