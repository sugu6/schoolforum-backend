spring:
  application:
    name: schoolforum
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null

server:
  port: 8085

mybatis-flex:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  cookie-auto-fill-prefix: true
  timeout: 604800
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-log: false
  is-read-header: true
  is-read-cookie: true
  is-read-body: false
  jwt-secret-key: ${JWT_SECRET_KEY:schoolforum-dev-jwt-secret-key-do-not-use-in-production}
  cookie:
    httpOnly: true
    secure: false
    sameSite: Lax
    path: /

springdoc:
  swagger-ui:
    try-it-out-enabled: true

hot-rank:
  like-weight: 3.0
  comment-weight: 5.0
  favorite-weight: 4.0
  view-weight: 0.1
  decay-base: 24.0
  decay-exponent: 1.5
  essential-bonus: 50.0
  pinned-bonus: 30.0
  rate-weight: 5.0
  max-rate: 1.0
  min-views-for-rate: 50

file:
  upload:
    avatar-path: ${UPLOAD_AVATAR_PATH:./uploads/avatars/}
    post-image-path: ${UPLOAD_POST_IMAGE_PATH:./uploads/post-images/}
    max-size: 5MB
    allowed-types: image/jpeg,image/png,image/gif,image/webp
