services:
  manticore:
    image: manticoresearch/manticore:latest
    container_name: manticore
    restart: always
    ports:
      - "127.0.0.1:9306:9306"
      - "127.0.0.1:9308:9308"
      - "127.0.0.1:9312:9312"
    volumes:
      - manticore_data:/var/lib/manticore
    environment:
      - TZ=Asia/Shanghai
      - EXTRA=1
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "9306", "-e", "SHOW TABLES"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M

  schoolforum:
    image: ghcr.io/sugu6/schoolforum-backend:latest
    container_name: schoolforum
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    command: ["sh", "-c", "java ${JAVA_OPTS:--Xms128m -Xmx384m} -jar app.jar"]
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_ADDRESS=0.0.0.0
      - SERVER_PORT=8085
      - MANTICORE_HOST=${MANTICORE_HOST:-http://manticore}
      - MANTICORE_PORT=${MANTICORE_PORT:-9308}
      - REDIS_HOST=${REDIS_HOST:-host.docker.internal}
    ports:
      - "127.0.0.1:8085:8085"
    volumes:
      - /var/log/schoolforum:/var/log/schoolforum
      - uploads_data:/app/uploads
    depends_on:
      manticore:
        condition: service_started
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8085"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M

  # Nginx 在宿主机独立运行，不在容器内
  # 配置文件位于 /etc/nginx/conf.d/schoolforum.conf

volumes:
  manticore_data:
  uploads_data:
