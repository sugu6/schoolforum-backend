name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: suguny/schoolforum-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: schoolforum_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: chmod +x mvnw && ./mvnw test -Dspring.profiles.active=test --batch-mode

  build:
    name: Build & Push Docker Image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3

      - name: Delete old GHCR package versions
        if: github.ref == 'refs/heads/master'
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'schoolforum-backend'
          package-type: 'container'
          min-versions-to-keep: 1

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Auto bump version and create tag
        if: github.ref == 'refs/heads/master'
        id: version
        run: |
          # 获取最新tag
          LATEST_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.0.1"
          else
            # 递增patch版本号
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          
          # 获取更新日志
          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" -20)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${LATEST_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        if: github.ref == 'refs/heads/master'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        if: github.ref == 'refs/heads/master'
        run: chmod +x mvnw && ./mvnw package -DskipTests --batch-mode

      - name: Create Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## ${{ steps.version.outputs.tag }}
            
            ### 更新日志
            ${{ steps.version.outputs.changelog }}
          files: target/*.jar

  deploy:
    name: Deploy to Docker Server
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose and nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DOCKER_HOST }}
          username: root
          password: ${{ secrets.ROOT_PASSWORD }}
          port: ${{ secrets.DOCKER_PORT || 22 }}
          source: docker-compose.yml,nginx/schoolforum.conf
          target: /opt/schoolforum/
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_HOST }}
          username: root
          password: ${{ secrets.ROOT_PASSWORD }}
          port: ${{ secrets.DOCKER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /opt/schoolforum

            echo "=== Ensuring .env exists ==="
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found at /opt/schoolforum/.env"
              echo "Please create it based on .env.example"
              exit 1
            fi

            # 确保 Redis/MySQL 使用 host.docker.internal（Docker 容器内访问宿主机）
            if grep -q "REDIS_HOST=38.76.209.225" .env 2>/dev/null; then
              sed -i 's/REDIS_HOST=38.76.209.225/REDIS_HOST=host.docker.internal/' .env
              echo "Updated REDIS_HOST to host.docker.internal"
            fi
            if grep -q "38.76.209.225:13306" .env 2>/dev/null; then
              sed -i 's/38.76.209.225:13306/host.docker.internal:13306/' .env
              echo "Updated DB_URL to host.docker.internal"
            fi

            echo "=== Stopping old containers ==="
            docker compose down --remove-orphans --timeout 10 2>/dev/null || true
            docker rm -f schoolforum schoolforum-certbot 2>/dev/null || true
            docker network prune -f 2>/dev/null || true

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "=== Pulling images ==="
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "=== Starting services ==="
            docker compose up -d

            echo "=== Waiting for backend to be healthy ==="
            for i in $(seq 1 60); do
              if docker exec schoolforum sh -c "curl -sf http://localhost:8085/categories/list > /dev/null 2>&1 || nc -z localhost 8085"; then
                echo "Backend is healthy!"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "Backend failed to start. Logs:"
                docker compose logs schoolforum --tail 50
                exit 1
              fi
              echo "Waiting for backend... ($i/60)"
              sleep 5
            done

            echo "=== Updating host Nginx config ==="
            cp /opt/schoolforum/nginx/schoolforum.conf /etc/nginx/conf.d/schoolforum.conf

            # 确保前端静态文件目录存在
            mkdir -p /var/www/schoolforum

            nginx -t && nginx -s reload
            echo "Nginx config updated and reloaded"

            docker image prune -f
            echo "=== Deploy completed ==="
            docker compose ps