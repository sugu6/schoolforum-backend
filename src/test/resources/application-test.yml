server:
  port: 8085

manticore:
  host: http://127.0.0.1
  port: 9308

spring:
  datasource:
    url: jdbc:h2:mem:schoolforum_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

  mail:
    username: test@test.com

oauth:
  github:
    client-id: test
    client-secret: test
    redirect-uri: http://localhost:8085/oauth/callback/github

sa-token:
  token-name: satoken
  timeout: 604800
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-log: false
  is-read-header: true
  is-read-cookie: true
  jwt-secret-key: test-jwt-secret-key-for-testing

logging:
  level:
    com.example.schoolforum: warn
