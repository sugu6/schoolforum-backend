server:
  port: 8085

manticore:
  host: ${MANTICORE_HOST:http://127.0.0.1}
  port: ${MANTICORE_PORT:9308}

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/schoolforum?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DEV_DB_USERNAME:root}
    password: ${DEV_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      pool-name: SchoolForumHikariCP-Dev
      leak-detection-threshold: 60000

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${DEV_REDIS_PASSWORD:}
      database: 0
      timeout: 10s

  mail:
    host: smtp.qq.com
    port: 587
    username: ${DEV_MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

cors:
  allowed-origins: http://localhost:5173,http://localhost:8080

oauth:
  github:
    client-id: ${DEV_GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/callback}
    disable-ssl: ${OAUTH_DISABLE_SSL:false}

logging:
  level:
    com.example.schoolforum: debug
    org.springframework.web: debug

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  cookie-auto-fill-prefix: true
  timeout: 3600
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-log: false
  is-read-header: true
  is-read-cookie: true
  is-read-body: false
  jwt-secret-key: ${JWT_SECRET_KEY:dev-secret-key-for-local-only}
  cookie:
    httpOnly: true
    secure: false
    sameSite: Lax
    path: /
