# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name schoolforum.sugu6.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl;
    server_name schoolforum.sugu6.top;

    # SSL 证书（使用 certbot 自动管理）
    ssl_certificate     /etc/letsencrypt/live/schoolforum.sugu6.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schoolforum.sugu6.top/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 客户端上传大小限制
    client_max_body_size 20m;

    # 前端静态文件（从服务器本地目录提供）
    root /var/www/schoolforum;
    index index.html;

    # WebSocket 代理（私信 + 帖子统计，使用 /api/ 路径避免广告拦截器拦截 /ws/）
    location /api/realtime {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_intercept_errors off;
    }

    location /api/post-stats {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_intercept_errors off;
    }

    # SSE 通知代理（需要长超时）
    location /notifications/subscribe {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    # API 代理（剥离 /api 前缀后转发给后端）
    location /api/ {
        proxy_pass http://127.0.0.1:8085/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 头像/上传文件代理
    location /avatars/ {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
    }

    location /post-images/ {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
    }

    # Swagger UI（可选）
    location /swagger-ui.html {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
    }

    location /v3/ {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
    }

    # SPA 路由回退：所有未匹配的路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
