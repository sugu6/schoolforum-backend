server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: 8085

manticore:
  host: ${MANTICORE_HOST:http://127.0.0.1}
  port: ${MANTICORE_PORT:9308}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/schoolforum?characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      pool-name: SchoolForumHikariCP-Prod
      leak-detection-threshold: 30000

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 10s

  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

cors:
  allowed-origins: https://schoolforum.sugu6.top

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:https://schoolforum.sugu6.top/callback}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-log: false
  is-read-header: true
  is-read-cookie: true
  is-read-body: false
  jwt-secret-key: ${JWT_SECRET_KEY}
  cookie:
    httpOnly: true
    secure: true
    sameSite: Lax
    path: /
file:
  upload:
    avatar-path: ${UPLOAD_AVATAR_PATH:/app/uploads/avatars/}
    post-image-path: ${UPLOAD_POST_IMAGE_PATH:/app/uploads/post-images/}
    max-size: 5MB
    allowed-types: image/jpeg,image/png,image/gif,image/webp

logging:
  level:
    com.example.schoolforum: info
    org.springframework.web: warn
    org.springframework.boot: warn
  file:
    path: ${LOG_PATH:/var/log/schoolforum}
